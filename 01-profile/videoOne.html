<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Card</title>

    <style>
      body{
        background-color: gray;
      }

      .profile-img{
        height: 200px;
        width: 200px;
        border-radius: 50%;
        object-fit: cover;
        margin: 15px 0;
      }

      .container{
        width: 75%;
        max-width: fit-content;
        margin: 40px auto;
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
      }

      h1{
        margin: 10px 0 5px;
      }

      p{
        color: gray;
        font-size: 14px;
        margin-bottom: 15px;
      }

      .btn{
        padding: 10px 15px;
        margin: 5px;
        border: none;
        background-color: #202040;
        cursor: pointer;
        font-size: 14px;
      }

      a{
        color: white;
        text-decoration: none;
      }

      .btn:hover{
        background-color: #404070;
      }

    </style>

  </head>
  <body>
    <div class="container">
      <h1>Satyaansh Softech Pvt. Ltd.</h1>
      <img src="images/satyawan.jpg" alt="ceo image" class="profile-img" />

      <h1>Satywan Panchal</h1>
      <p>Founder & CEO</p>
      <p>Web Developer | Corporate Trainer</p>

      <button class="btn">
        <a
          href="https://www.instagram.com/satyaanshsoftech?utm_source=qr&igsh=MXkybnFoaGszb2huaw%3D%3D"
        >
          Follow
        </a>
      </button>
      <button class="btn">
        <a href="https://www.linkedin.com/company/satyaansh-softech-pvt-ltd/"
          >Linked In</a
        >
      </button>
      <p>Contact: +91-7082252235</p>
    </div>
  </body>
</html>
